<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#263243">
  <title>Ordemilk Tech</title>

  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#ff6600', // Laranja Ordemilk
            brandSoft: '#ff8833', // Laranja Hover
            techDark: '#2a3646', // Background Secundário (Inputs/Inactive Toggles)
            techPanel: '#3b4c61', // Fundo de Cards (com opacidade na UI)
            techBorder: '#4a5c73', // Bordas dos painéis
            electricBlue: '#00d9ff', // Ciano para marcações e robô
            neonViolet: '#3b82f6',
            neonCyan: '#00d9ff',
            textMuted: '#9ca7b8', // Textos Secundários
          },
          fontFamily: {
            sans: ['"Inter"', 'sans-serif'],
            display: ['"Space Grotesk"', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'monospace'],
          }
        }
      }
    }
  </script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1f2a3a 0%, #0a0e14 100%);
      margin: 0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    #root {
      width: 100%;
      max-width: 100%;
      height: 100%;
      background-image: linear-gradient(to bottom, #263243, #758498, #e4e9f0);
      position: relative;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      color: #ffffff;
    }

    @media (min-width: 600px) {
      #root {
        max-width: 448px;
      }
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 0px;
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.5s ease-out forwards;
    }

    .pt-safe {
      padding-top: max(20px, env(safe-area-inset-top));
    }

    .pb-safe {
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
  </style>
</head>

<body class="text-white">
  <div id="root"></div>
  <script type="module" src="/index.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('✅ Service Worker do PWA registrado!', reg))
          .catch(err => console.error('❌ Falha ao registrar Service Worker do PWA:', err));
      });
    }
  </script>
</body>

</html>
