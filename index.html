<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <title>Ordemilk Tech</title>

  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
      body { 
          font-family: 'Inter', sans-serif; 
          background-color: #0f172a; 
          color: #ffffff; 
          overflow: hidden; 
          background-image: linear-gradient(to bottom, #0f172a, #0f172a);
          background-size: cover; 
          background-position: center; 
          background-attachment: fixed; 
          -webkit-tap-highlight-color: transparent; 
      }
      h1, h2, h3, h4, h5, h6, .font-heading { font-family: 'Space Grotesk', sans-serif; }
      ::-webkit-scrollbar { width: 0px; display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
      
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
      
      .pt-safe { padding-top: max(20px, env(safe-area-inset-top)); }
      .pb-safe { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  </style>
</head>

<body class="bg-[#0f172a] text-white">
  <div id="root"></div>
  <script type="module" src="/index.js"></script>
</body>
</html>
